plugins {
    id 'java'
    id 'jacoco' // code coverage
//    id "com.github.spotbugs" version "6.1.2" apply false
}

repositories {
    mavenCentral()
    maven {
        url = uri("https://oss.sonatype.org/content/repositories/snapshots")
    }
}


