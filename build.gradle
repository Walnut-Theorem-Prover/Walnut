spotbugs {
    toolVersion = '4.9.1'
}

spotbugsMain {
    reports {
        xml.enabled = false
        html.enabled = true
    }
}
*/
jar {
    manifest {
        attributes 'Main-Class': 'Main.Prover'
    }
}

allprojects {
    gradle.projectsEvaluated {
        tasks.withType(JavaCompile) {
            options.compilerArgs << "-Xlint:all"
            options.release = 17
            sourceCompatibility = '17'
            targetCompatibility = '17'
        }
    }
}

/*sourceSets {
    main {
        resources {
            srcDirs = ["src/main/resources"]
        }
    }
}*/

jacoco {
    toolVersion = "0.8.14"
    reportsDirectory = layout.buildDirectory.dir('customJacocoReportDir')
}

jacocoTestReport {
    reports {
        xml.required = false
        csv.required = false
        html.outputLocation = layout.buildDirectory.dir('jacocoHtml')
    }
}

dependencies {
    implementation 'it.unimi.dsi:fastutil:8.5.18'
    implementation 'dk.brics:automaton:1.12-4'
    implementation 'net.automatalib:automata-serialization-ba:0.12.1'
    implementation 'net.automatalib:automata-util:0.12.1'
    implementation 'com.github.ben-manes.caffeine:caffeine:3.2.2' // for OTF
    implementation(files("libs/OTF-1.1.0.jar")) // available at https://github.com/jn1z/OTF
    implementation "org.slf4j:slf4j-api:2.0.13"
    runtimeOnly "ch.qos.logback:logback-classic:1.5.6"
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.11.4'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.11.4'
//  compileOnly "com.github.spotbugs:spotbugs-annotations:${spotbugs.toolVersion.get()}"
//  spotbugsPlugins 'com.h3xstream.findsecbugs:findsecbugs-plugin:1.13.0'
}

configurations.all {
    exclude group: "org.slf4j", module: "slf4j-nop"
}

test {
    useJUnitPlatform()
}

test {
    failFast = true // stop unit/integration tests when there's a failure
    finalizedBy jacocoTestReport // report is always generated after tests run
}
jacocoTestReport {
    dependsOn test // tests are required to run before generating the report
}
apply plugin: 'java'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

test {
    testLogging {
        outputs.upToDateWhen {false}
        showStandardStreams = true
    }
}
task customFatJar(type: Jar) {
    manifest {
        attributes 'Main-Class': 'Main.Prover'
    }
    archiveBaseName = 'Walnut-all'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from sourceSets.main.output
    from({
        configurations.runtimeClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }) {
        exclude "logback.xml"
        exclude "logback-test.xml"
        exclude "logback.scmo"
        exclude "logback-test.scmo"
    }
}
